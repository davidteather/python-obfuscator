repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          [
            "--max-line-length=88",
            "--extend-ignore=E203,W503,E501,F401,F541",
          ]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy python_obfuscator
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

      - id: pytest-unit
        name: Run unit tests
        entry: poetry run pytest tests/ -v
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

      - id: pytest-coverage-report
        name: pytest coverage report (manual)
        entry: poetry run pytest tests --cov=python_obfuscator --cov-report=term-missing --cov-report=html
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]

default_language_version:
  python: python3

fail_fast: true

default_stages: [commit]
